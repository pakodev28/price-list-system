services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-price_list}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        BAKE_MODEL: ${BAKE_MODEL:-1}
    image: price-list-system-backend
    pull_policy: build
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    volumes:
      - ./backend:/app
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: price-list-system-backend
    pull_policy: never
    # Skip the migrate entrypoint — only the backend service applies migrations.
    entrypoint: []
    # Cap prefork workers: each process lazily loads its own copy of the embedding
    # model, and per-task LLM fan-out already runs concurrently via threads.
    command: celery -A config worker -l info --concurrency=4
    env_file: .env
    volumes:
      - ./backend:/app
      - media:/app/media
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
